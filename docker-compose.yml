version: '3.8'
services:
  redundancy-system:
    build:
      context: .
      dockerfile: Dockerfile.project1
    ports:
      - "5001:5001"
    env_file:
      - project1_redundancy/.env
    restart: always

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.project2
    ports:
      - "5002:5002"
    env_file:
      - project2_chatbot/.env
    restart: always
